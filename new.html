                            <button onclick="toggleMessStatus('${s.id}', 'breakfast')" class="w-10 h-10 rounded-xl font-bold text-[10px] btn-press ${a.breakfast?'bg-orange-500 text-white shadow-lg shadow-orange-100':'bg-slate-100 text-slate-400'}">B</button>
                            <button onclick="toggleMessStatus('${s.id}', 'lunch')" class="w-10 h-10 rounded-xl font-bold text-[10px] btn-press ${a.lunch?'bg-blue-500 text-white shadow-lg shadow-blue-100':'bg-slate-100 text-slate-400'}">L</button>
                            <button onclick="toggleMessStatus('${s.id}', 'dinner')" class="w-10 h-10 rounded-xl font-bold text-[10px] btn-press ${a.dinner?'bg-emerald-500 text-white shadow-lg shadow-emerald-100':'bg-slate-100 text-slate-400'}">D</button>
                        </div>
                    </div>`;
            }).join('');
        };
        draw();
        document.getElementById('messDateInput').onchange = (e) => { messDate = e.target.value; draw(); };
    }

    function toggleMessStatus(sid, type) {
        let a = state.attendance.find(x => x.studentId === sid && x.date === messDate);
        if(!a) { a = { studentId: sid, date: messDate, breakfast: false, lunch: false, dinner: false }; state.attendance.push(a); }
        a[type] = !a[type];
        sync(); renderMess(document.getElementById('app'));
    }

    // --- Tab: Profile ---
    function renderProfile(el) {
        const s = state.students.find(x=>x.id===activeStudentId);
        if(!s) return;
        const payments = state.payments.filter(p=>p.studentId===s.id);
        el.innerHTML = `
            <div class="fade-in space-y-6">
                <div class="bg-white p-8 rounded-[3rem] text-center card-shadow relative overflow-hidden">
                    <div class="absolute top-0 left-0 right-0 h-24 profile-gradient"></div>
                    <img src="${s.photo}" class="relative z-10 w-28 h-28 rounded-[2.5rem] mx-auto mb-4 object-cover border-4 border-white shadow-xl">
                    <h2 class="text-xl font-black text-slate-800">${s.name}</h2>
                    <p class="text-xs font-bold text-slate-400 uppercase mb-6">${s.roomName} • ${s.phone}</p>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="genStudentMessPdf('${s.id}')" class="bg-orange-500 text-white p-3 rounded-xl text-[10px] font-black uppercase btn-press"><i class="fas fa-file-pdf mr-1"></i> Mess Log</button>
                        <button onclick="sendWhatsApp('${s.id}')" class="bg-emerald-600 text-white p-3 rounded-xl text-[10px] font-black uppercase btn-press"><i class="fab fa-whatsapp mr-1"></i> Send Alert</button>
                    </div>
                </div>
                
                <div class="bg-white p-6 rounded-3xl card-shadow space-y-4">
                    <div class="flex justify-between items-center"><p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Recent Payments</p><button onclick="collectFee('${s.id}')" class="text-emerald-600 text-[10px] font-black uppercase">+ Add New</button></div>
                    <div class="space-y-2">
                        ${payments.length ? payments.reverse().map(p => `
                            <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl">
                                <div><p class="text-sm font-black text-slate-800">Rs. ${p.total}</p><p class="text-[9px] text-slate-400 font-bold">${p.date} (${p.month})</p></div>
                                <button onclick="genReceipt('${p.id}')" class="w-8 h-8 bg-white rounded-lg flex items-center justify-center text-slate-400 text-xs shadow-sm"><i class="fas fa-download"></i></button>
                            </div>
                        `).join('') : '<p class="text-center py-4 text-xs text-slate-300 font-bold uppercase">No records</p>'}
                    </div>
                </div>

                <div class="flex gap-2">
                    <button onclick="currentTab='edit'; render()" class="flex-1 bg-slate-900 text-white p-4 rounded-2xl text-[10px] font-black uppercase btn-press">Edit Resident</button>
                    <button onclick="deleteResident('${s.id}')" class="bg-rose-50 text-rose-600 px-6 rounded-2xl btn-press"><i class="fas fa-trash-alt"></i></button>
                </div>
            </div>`;
    }

    function deleteResident(id) {
        if(confirm("Are you sure you want to remove this resident?")) {
            state.students = state.students.filter(s => s.id !== id);
            sync(); changeTab('rooms');
        }
    }

    // --- Tab: Finance ---
    function renderFinance(el) {
        el.innerHTML = `
            <div class="fade-in space-y-4">
                <div class="flex justify-between items-center"><h2 class="text-xl font-black text-slate-800">Fee Ledger</h2><input type="month" value="${filterMonth}" onchange="filterMonth=this.value; render()" class="text-xs font-black bg-white px-3 py-2 rounded-xl border-none card-shadow"></div>
                <div class="space-y-3 pb-10">${state.students.map(s=>{
                    const paid = state.payments.filter(p=>p.studentId===s.id && p.month===filterMonth).reduce((sum,p)=>sum+p.total,0);
                    const total = s.hFee + s.mFee;
                    const bal = total - paid;
                    return `<div class="bg-white p-5 rounded-[2rem] flex justify-between items-center card-shadow">
                        <div><p class="text-sm font-black text-slate-800">${s.name}</p><p class="text-[9px] text-slate-400 font-bold uppercase">Due: Rs. ${total} | Paid: Rs. ${paid}</p></div>
                        ${bal<=0 ? `<span class="bg-emerald-100 text-emerald-600 px-3 py-1.5 rounded-xl text-[10px] font-black uppercase">Paid</span>` : `<button onclick="collectFee('${s.id}')" class="bg-rose-50 text-rose-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest btn-press">Rs. ${bal} Due</button>`}
                    </div>`;
                }).join('')}</div>
            </div>`;
    }

    function collectFee(id) {
        const s = state.students.find(x=>x.id===id);
        const paidSoFar = state.payments.filter(p=>p.studentId===s.id && p.month===filterMonth).reduce((sum,p)=>sum+p.total,0);
        const remaining = (s.hFee + s.mFee) - paidSoFar;
        const amt = prompt(`Payment for ${s.name} (${filterMonth}):`, remaining);
        if(amt && !isNaN(amt)) {
            state.payments.push({ id:'TXN'+Date.now(), studentId:id, month:filterMonth, date:new Date().toLocaleDateString('en-GB'), total:Number(amt) });
            sync(); render();
        }
    }

    // --- WhatsApp Logic ---
    function sendWhatsApp(id) {
        const s = state.students.find(x => x.id === id);
        const paid = state.payments.filter(p => p.studentId === s.id && p.month === filterMonth).reduce((sum, p) => sum + p.total, 0);
        const total = s.hFee + s.mFee;
        const bal = total - paid;
        const monthName = new Date(filterMonth + "-01").toLocaleString('default', { month: 'long', year: 'numeric' });

        const msg = `*Assalam-o-Alaikum ${s.name}*\n\n` +
                    `This is a reminder from *Indus Boys Hostel Sukkur* for the month of *${monthName}*.\n\n` +
                    `*Fee Summary:*\n` +
                    `- Total Payable: Rs. ${total}\n` +
                    `- Amount Paid: Rs. ${paid}\n` +
                    `---------------------------\n` +
                    `- *Remaining Balance: Rs. ${bal}*\n` +
                    `---------------------------\n` +
                    `Please clear your dues at the office. We appreciate your cooperation.\n` +
                    `_This is system generated message_\n\n` +
                    `*Management, Indus Boys Hostel*`;

        const phone = s.phone.startsWith('0') ? '92' + s.phone.substring(1) : s.phone;
        window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    // --- Tab: Reports ---
    function renderReports(el) {
        el.innerHTML = `
            <div class="fade-in space-y-6">
                <h2 class="text-xl font-black text-slate-800">Reports Center</h2>
                <div class="bg-white p-6 rounded-[2.5rem] card-shadow space-y-4">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Configure Report</p>
                    <input type="month" id="repMonth" class="w-full p-4 bg-slate-50 rounded-2xl text-sm font-bold border-none" value="${filterMonth}">
                    <div class="grid gap-3">
                        <button onclick="genGlobalMessLog()" class="bg-emerald-600 text-white p-5 rounded-2xl text-xs font-black uppercase flex justify-between items-center shadow-lg shadow-emerald-50">Monthly Mess Activity <i class="fas fa-calendar-alt"></i></button>
                        <button onclick="genPdf('finance')" class="bg-slate-900 text-white p-5 rounded-2xl text-xs font-black uppercase flex justify-between items-center">Monthly Finance <i class="fas fa-file-invoice-dollar"></i></button>
                        <button onclick="genPdf('defaulters')" class="bg-rose-600 text-white p-5 rounded-2xl text-xs font-black uppercase flex justify-between items-center">Defaulters List <i class="fas fa-exclamation-circle"></i></button>
                    </div>
                </div>
            </div>`;
    }

    // --- ENHANCED PDF GENERATION ---
    function genGlobalMessLog() {
        const monthStr = document.getElementById('repMonth').value;
        if (!monthStr) return alert("Select month");
        const [year, month] = monthStr.split('-').map(Number);
        const daysInMonth = new Date(year, month, 0).getDate();
        const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a3' });

        const hostelRes = state.students.filter(s => s.roomName.toLowerCase() !== 'mess only');
        const messOnlyRes = state.students.filter(s => s.roomName.toLowerCase() === 'mess only');

        // Layout Config
        const pages = [
            { list: hostelRes, start: 1, end: 15, title: "HOSTEL RESIDENTS", group: true },
            { list: hostelRes, start: 16, end: daysInMonth, title: "HOSTEL RESIDENTS", group: true },
            { list: messOnlyRes, start: 1, end: 15, title: "MESS ONLY RESIDENTS", group: false },
            { list: messOnlyRes, start: 16, end: daysInMonth, title: "MESS ONLY RESIDENTS", group: false }
        ];

        pages.forEach((p, idx) => {
            if (p.list.length === 0) return;
            if (idx > 0) doc.addPage();
            
            const monthName = new Date(year, month-1).toLocaleString('default', { month: 'long', year: 'numeric' });
            doc.setFontSize(24); doc.setTextColor(15, 23, 42);
            doc.text("INDUS BOYS HOSTEL SUKKUR", 14, 18);
            doc.setFontSize(14); doc.text(`${p.title} • ${monthName} • DAYS ${p.start}-${p.end}`, 14, 28);

            const h1 = [{ content: 'S#', rowSpan: 2 }, { content: 'Resident Name', rowSpan: 2 }];
            const h2 = [];
            for (let d = p.start; d <= p.end; d++) {
                h1.push({ content: d.toString(), colSpan: 3, styles: { halign: 'center', fillColor: [5, 150, 105] } });
                h2.push('B', 'L', 'D');
            }

            const body = [];
            let count = 1;
            if (p.group) {
                const rooms = [...new Set(p.list.map(s => s.roomName))].sort();
                rooms.forEach(r => {
                    body.push([{ content: r.toUpperCase(), colSpan: 2 + ((p.end-p.start+1)*3), styles: { fillColor: [240, 240, 240], fontStyle: 'bold', halign: 'left' } }]);
                    p.list.filter(s => s.roomName === r).forEach(st => body.push(makeRow(st, count++, monthStr, p.start, p.end)));
                });
            } else {
                p.list.forEach(st => body.push(makeRow(st, count++, monthStr, p.start, p.end)));
            }

            doc.autoTable({
                head: [h1, h2], body: body, startY: 35, theme: 'grid',
                styles: { fontSize: 6, cellPadding: 0.8, lineWidth: 0.1, halign: 'center' },
                columnStyles: { 0: { cellWidth: 10 }, 1: { cellWidth: 50, halign: 'left' } },
                headStyles: { fillColor: [30, 41, 59], fontSize: 8 },
                didParseCell: (data) => {
                    if (data.section === 'body' && data.column.index > 1) {
                        if (data.cell.raw === 'B') { data.cell.styles.fillColor = [249, 115, 22]; data.cell.text = ''; }
                        if (data.cell.raw === 'L') { data.cell.styles.fillColor = [59, 130, 246]; data.cell.text = ''; }
                        if (data.cell.raw === 'D') { data.cell.styles.fillColor = [16, 185, 129]; data.cell.text = ''; }
                    }
                }
            });
        });

        doc.save(`Indus_Mess_Log_${monthStr}.pdf`);
    }

    function makeRow(st, snum, monthStr, s, e) {
        const row = [snum, st.name];
        for (let d = s; d <= e; d++) {
            const dt = `${monthStr}-${String(d).padStart(2, '0')}`;
            const a = state.attendance.find(x => x.studentId === st.id && x.date === dt) || {};
            row.push(a.breakfast?'B':'', a.lunch?'L':'', a.dinner?'D':'');
        }
        return row;
    }

    function genStudentMessPdf(id) {
        const s = state.students.find(x=>x.id===id);
        const doc = new jsPDF();
        doc.setFontSize(18); doc.text("INDUS BOYS HOSTEL", 14, 20);
        doc.setFontSize(11); doc.text(`Mess Activity Log: ${s.name} (${filterMonth})`, 14, 28);
        const data = state.attendance.filter(a=>a.studentId===id && a.date.startsWith(filterMonth)).sort((a,b)=>a.date.localeCompare(b.date)).map(a=> [a.date, a.breakfast?'B':'', a.lunch?'L':'', a.dinner?'D':'']);
        doc.autoTable({ head: [['Date', 'B', 'L', 'D']], body:data, startY:35, didParseCell: (d) => {
            if (d.section === 'body' && d.cell.raw === 'B') { d.cell.styles.fillColor = [249, 115, 22]; d.cell.text=''; }
            if (d.section === 'body' && d.cell.raw === 'L') { d.cell.styles.fillColor = [59, 130, 246]; d.cell.text=''; }
            if (d.section === 'body' && d.cell.raw === 'D') { d.cell.styles.fillColor = [16, 185, 129]; d.cell.text=''; }
        }});
        doc.save(`${s.name}_Mess.pdf`);
    }

    function genPdf(type) {
        const month = document.getElementById('repMonth').value;
        const doc = new jsPDF();
        doc.setFontSize(18); doc.text("INDUS BOYS HOSTEL SUKKUR", 14, 20);
        doc.setFontSize(10); doc.text(`${type.toUpperCase()} REPORT - ${month}`, 14, 28);
        let head = [], body = [];
        if(type==='finance') {
            head = [['Room', 'Name', 'Expected', 'Paid', 'Balance']];
            body = state.students.map(s => {
                const paid = state.payments.filter(p=>p.studentId===s.id && p.month===month).reduce((sum,p)=>sum+p.total,0);
                return [s.roomName, s.name, (s.hFee+s.mFee), paid, (s.hFee+s.mFee)-paid];
            });
        } else {
            head = [['Room', 'Name', 'Phone', 'Pending']];
            body = state.students.filter(s=>{
                const paid = state.payments.filter(p=>p.studentId===s.id && p.month===month).reduce((sum,p)=>sum+p.total,0);
                return paid < (s.hFee+s.mFee);
            }).map(s => [s.roomName, s.name, s.phone, (s.hFee+s.mFee)-state.payments.filter(p=>p.studentId===s.id && p.month===month).reduce((sum,p)=>sum+p.total,0)]);
        }
        doc.autoTable({ head, body, startY: 35 });
        doc.save(`${type}_Report.pdf`);
    }

    function genReceipt(payId) {
        const p = state.payments.find(x=>x.id===payId);
        const s = state.students.find(x=>x.id===p.studentId);
        const doc = new jsPDF({ unit:'mm', format:[80,100] });
        doc.setFontSize(12); doc.text("INDUS HOSTEL RECEIPT", 40, 15, {align:'center'});
        doc.setFontSize(8); doc.text(`Student: ${s.name}`, 10, 30);
        doc.text(`Room: ${s.roomName}`, 10, 35);
        doc.text(`Date: ${p.date} (${p.month})`, 10, 40);
        doc.setFontSize(12); doc.text(`PAID: RS. ${p.total}`, 40, 60, {align:'center'});
        doc.setFontSize(6); doc.text("Software Generated Receipt", 40, 90, {align:'center'});
        doc.save(`Receipt_${s.name}.pdf`);
    }

    // --- Tab: Add/Edit Form ---
    function renderForm(el) {
        const isEdit = currentTab === 'edit';
        const s = isEdit ? state.students.find(x=>x.id===activeStudentId) : null;
        el.innerHTML = `
            <div class="fade-in bg-white p-8 rounded-[2.5rem] card-shadow">
                <h2 class="text-xl font-black text-slate-800 mb-8 uppercase tracking-widest">${isEdit?'Update':'Register'} Resident</h2>
                <form id="studentForm" class="space-y-4">
                    <div class="flex flex-col items-center mb-6">
                        <div class="relative group cursor-pointer" onclick="document.getElementById('photoInput').click()">
                            <img id="profilePreview" src="${s?.photo||DEFAULT_IMG}" class="w-24 h-24 rounded-[2rem] object-cover border-4 border-emerald-50 shadow-lg">
                            <div class="absolute inset-0 bg-black/40 rounded-[2rem] flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"><i class="fas fa-camera text-white"></i></div>
                        </div>
                        <input type="file" id="photoInput" accept="image/*" class="hidden" onchange="previewPhoto(this)">
                    </div>
                    <input name="name" value="${s?.name||''}" placeholder="Full Name" required class="w-full p-4 bg-slate-50 rounded-2xl text-sm font-bold border-none">
                    <input name="roomName" value="${s?.roomName||''}" placeholder="Room Name (e.g. FFR 01)" required class="w-full p-4 bg-slate-50 rounded-2xl text-sm font-bold border-none">
                    <input name="phone" value="${s?.phone||''}" placeholder="WhatsApp No (03xxxxxxxxx)" required class="w-full p-4 bg-slate-50 rounded-2xl text-sm font-bold border-none">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" name="hFee" value="${s?.hFee||0}" placeholder="Hostel Fee" class="w-full p-4 bg-slate-50 rounded-2xl text-sm font-bold border-none">
                        <input type="number" name="mFee" value="${s?.mFee||0}" placeholder="Mess Fee" class="w-full p-4 bg-slate-50 rounded-2xl text-sm font-bold border-none">
                    </div>
                    <button type="submit" class="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black uppercase text-sm shadow-lg btn-press">${isEdit?'Save Changes':'Register Resident'}</button>
                </form>
            </div>`;

        document.getElementById('studentForm').onsubmit = (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const data = { 
                id: isEdit ? activeStudentId : 'ST' + Date.now(), 
                name: fd.get('name'), roomName: fd.get('roomName'), phone: fd.get('phone'), 
                hFee: Number(fd.get('hFee')), mFee: Number(fd.get('mFee')), 
                photo: document.getElementById('profilePreview').src, joined: s?.joined || new Date().toISOString().split('T')[0] 
            };
            if(isEdit) state.students = state.students.map(x => x.id === activeStudentId ? data : x);
            else state.students.push(data);
            sync(); changeTab('rooms');
        };
    }

    window.previewPhoto = (input) => {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => document.getElementById('profilePreview').src = e.target.result;
            reader.readAsDataURL(input.files[0]);
        }
    };

    // Initialize App
    changeTab('dashboard');
  </script>
</body>
</html>
