<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Indus Hostel | Management Pro v7</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; color: #0f172a; margin: 0; padding: 0; }
    .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
    .nav-active { color: #059669 !important; transform: translateY(-2px); }
    .nav-active i { background: #ecfdf5; padding: 8px; border-radius: 12px; }
    .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
    .btn-b { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); }
    .btn-l { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
    .btn-d { background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%); }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    input:focus { outline: none; ring: 2px; ring-color: #10b981; }
    .receipt-container { width:650px; background:#fff; border:3px solid #059669; }
  </style>
</head>
<body class="antialiased">

  <div class="min-h-screen pb-32">
    <!-- Header -->
    <header class="sticky top-0 z-50 glass px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-emerald-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-emerald-200">
          <i class="fas fa-hotel"></i>
        </div>
        <div>
          <h1 class="text-base font-extrabold text-slate-800 leading-tight">Indus Boys Hostel</h1>
          <p class="text-[9px] uppercase font-bold text-emerald-600 tracking-widest">Management System</p>
        </div>
      </div>
      <button id="globalBackBtn" class="hidden h-10 w-10 bg-white rounded-full flex items-center justify-center text-slate-600 shadow-sm border border-slate-100">
        <i class="fas fa-arrow-left"></i>
      </button>
    </header>

    <!-- Main Content Area -->
    <main id="app" class="p-4 max-w-lg mx-auto"></main>

    <!-- Navigation Bar -->
    <nav class="fixed bottom-0 left-0 right-0 glass border-t border-slate-200 flex justify-around items-center py-4 z-50 rounded-t-[2rem] shadow-2xl">
      <button onclick="changeTab('dashboard')" id="nav-dashboard" class="nav-item flex flex-col items-center gap-1 text-slate-400">
        <i class="fas fa-home text-xl"></i>
        <span class="text-[10px] font-bold">Home</span>
      </button>
      <button onclick="changeTab('rooms')" id="nav-rooms" class="nav-item flex flex-col items-center gap-1 text-slate-400">
        <i class="fas fa-users text-xl"></i>
        <span class="text-[10px] font-bold">Residents</span>
      </button>
      <button onclick="changeTab('mess')" id="nav-mess" class="nav-item flex flex-col items-center gap-1 text-slate-400">
        <i class="fas fa-utensils text-xl"></i>
        <span class="text-[10px] font-bold">Mess</span>
      </button>
      <button onclick="changeTab('finance')" id="nav-finance" class="nav-item flex flex-col items-center gap-1 text-slate-400">
        <i class="fas fa-wallet text-xl"></i>
        <span class="text-[10px] font-bold">Fees</span>
      </button>
      <button onclick="changeTab('reports')" id="nav-reports" class="nav-item flex flex-col items-center gap-1 text-slate-400">
        <i class="fas fa-file-invoice text-xl"></i>
        <span class="text-[10px] font-bold">Reports</span>
      </button>
    </nav>
  </div>

  <div id="captureArea" class="fixed -left-[9999px] top-0"></div>

  <script>
    // --- DATABASE & STATE ---
    const DB_KEY = 'indus_hostel_v7';
    let state = JSON.parse(localStorage.getItem(DB_KEY)) || { students: [], attendance: [], payments: [] };
    const sync = () => localStorage.setItem(DB_KEY, JSON.stringify(state));

    let currentTab = 'dashboard';
    let filterMonth = new Date().toISOString().slice(0, 7);
    let messDate = new Date().toISOString().split('T')[0];
    let activeStudentId = null;

    // --- NAVIGATION LOGIC ---
    function changeTab(tab) {
        currentTab = tab;
        render();
    }

    function render() {
        const app = document.getElementById('app');
        const backBtn = document.getElementById('globalBackBtn');
        
        // Reset scroll
        window.scrollTo(0, 0);

        // Header Back Button visibility
        backBtn.classList.toggle('hidden', !['add', 'profile', 'edit'].includes(currentTab));
        backBtn.onclick = () => {
            currentTab = (currentTab === 'edit' || currentTab === 'profile') ? 'rooms' : 'dashboard';
            render();
        };

        // Navigation Highlight
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('nav-active'));
        const activeNav = document.getElementById(`nav-${currentTab}`);
        if(activeNav) activeNav.classList.add('nav-active');

        // Route Views
        if (currentTab === 'dashboard') renderDashboard(app);
        else if (currentTab === 'rooms') renderResidents(app);
        else if (currentTab === 'mess') renderMess(app);
        else if (currentTab === 'finance') renderFinance(app);
        else if (currentTab === 'reports') renderReports(app);
        else if (currentTab === 'add' || currentTab === 'edit') renderForm(app);
        else if (currentTab === 'profile') renderProfile(app);
    }

    // --- VIEW 1: DASHBOARD ---
    function renderDashboard(el) {
        const today = new Date().toISOString().split('T')[0];
        const messToday = state.attendance.filter(a => a.date === today);
        const totalExpected = state.students.reduce((sum, s) => sum + (s.hFee + s.mFee), 0);
        const totalReceived = state.payments.filter(p => p.month === filterMonth).reduce((sum, p) => sum + p.total, 0);

        el.innerHTML = `
            <div class="fade-in space-y-6">
                <div><h2 class="text-2xl font-black text-slate-800">Assalam-o-Alaikum</h2><p class="text-sm font-medium text-slate-500">Hostel Overview</p></div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white p-5 rounded-[2rem] card-shadow">
                        <p class="text-[10px] font-black text-slate-400 uppercase mb-1">Total Residents</p>
                        <p class="text-3xl font-black text-slate-800">${state.students.length}</p>
                    </div>
                    <div class="bg-white p-5 rounded-[2rem] card-shadow text-emerald-600">
                        <p class="text-[10px] font-black text-slate-400 uppercase mb-1">Fee Collected</p>
                        <p class="text-xl font-black">Rs. ${totalReceived.toLocaleString()}</p>
                    </div>
                </div>

                <div class="bg-slate-900 p-6 rounded-[2.5rem] text-white shadow-2xl relative overflow-hidden">
                    <div class="relative z-10 space-y-5">
                        <p class="text-xs font-bold text-emerald-400 uppercase tracking-widest">Mess Demand Today</p>
                        <div class="grid grid-cols-3 gap-4">
                            <div class="text-center"><p class="text-2xl font-black">${messToday.filter(a=>a.breakfast).length}</p><p class="text-[9px] font-bold text-slate-400 uppercase">Breakfast</p></div>
                            <div class="text-center"><p class="text-2xl font-black">${messToday.filter(a=>a.lunch).length}</p><p class="text-[9px] font-bold text-slate-400 uppercase">Lunch</p></div>
                            <div class="text-center"><p class="text-2xl font-black">${messToday.filter(a=>a.dinner).length}</p><p class="text-[9px] font-bold text-slate-400 uppercase">Dinner</p></div>
                        </div>
                    </div>
                </div>
            </div>
        `;
    }

    // --- VIEW 2: RESIDENTS ---
    function renderResidents(el) {
        el.innerHTML = `
            <div class="fade-in space-y-4">
                <div class="flex justify-between items-center"><h2 class="text-xl font-black text-slate-800">Residents</h2><button onclick="changeTab('add')" class="bg-emerald-600 text-white px-4 py-2 rounded-xl text-xs font-black shadow-lg">ADD NEW</button></div>
                <div class="relative">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="resSearch" placeholder="Search by name or room..." class="w-full bg-white border border-slate-200 py-4 pl-12 pr-4 rounded-[1.25rem] text-sm font-semibold">
                </div>
                <div id="resList" class="space-y-4"></div>
            </div>
        `;
        const searchInput = document.getElementById('resSearch');
        searchInput.oninput = (e) => filterResidents(e.target.value);
        filterResidents("");
    }

    function filterResidents(q) {
        const container = document.getElementById('resList');
        const filtered = state.students.filter(s => s.name.toLowerCase().includes(q.toLowerCase()) || s.roomName.toLowerCase().includes(q.toLowerCase()));
        
        container.innerHTML = filtered.length ? filtered.map(s => `
            <div onclick="openProfile('${s.id}')" class="bg-white p-4 rounded-[1.5rem] flex items-center justify-between card-shadow cursor-pointer">
                <div class="flex items-center gap-4">
                    <img src="${s.photo || 'https://via.placeholder.com/100'}" class="w-12 h-12 rounded-xl object-cover border border-slate-100">
                    <div><p class="text-sm font-black text-slate-800">${s.name}</p><p class="text-[10px] text-slate-400 font-bold uppercase tracking-tighter">Room ${s.roomName}</p></div>
                </div>
                <i class="fas fa-chevron-right text-slate-200 text-xs"></i>
            </div>
        `).join('') : `<p class="text-center py-10 text-slate-400 italic text-xs">No matching residents found.</p>`;
    }

    // --- VIEW 3: MESS ---
    function renderMess(el) {
        el.innerHTML = `
            <div class="fade-in space-y-4">
                <div class="flex justify-between items-center"><h2 class="text-xl font-black text-slate-800">Mess Attendance</h2><input type="date" value="${messDate}" id="messDate" class="text-xs font-black bg-white px-3 py-2 rounded-xl border border-slate-100 shadow-sm"></div>
                <div class="relative">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="messSearch" placeholder="Filter by room or student..." class="w-full bg-white border border-slate-200 py-4 pl-12 pr-4 rounded-[1.25rem] text-sm font-semibold">
                </div>
                <div id="messStats" class="grid grid-cols-3 gap-2"></div>
                <div id="messList" class="space-y-3"></div>
            </div>
        `;
        document.getElementById('messDate').onchange = (e) => { messDate = e.target.value; updateMessList(document.getElementById('messSearch').value); };
        document.getElementById('messSearch').oninput = (e) => updateMessList(e.target.value);
        updateMessList("");
    }

    function updateMessList(q) {
        const list = document.getElementById('messList');
        const stats = document.getElementById('messStats');
        const filtered = state.students.filter(s => s.name.toLowerCase().includes(q.toLowerCase()) || s.roomName.toLowerCase().includes(q.toLowerCase()));
        
        let b=0, l=0, d=0;
        list.innerHTML = filtered.map(s => {
            const a = state.attendance.find(x => x.studentId === s.id && x.date === messDate) || {breakfast:false, lunch:false, dinner:false};
            if(a.breakfast) b++; if(a.lunch) l++; if(a.dinner) d++;
            return `
                <div class="bg-white p-4 rounded-3xl border border-slate-100 flex items-center justify-between card-shadow">
                    <div class="truncate mr-2"><p class="text-xs font-black text-slate-800 truncate">${s.name}</p><p class="text-[9px] font-bold text-slate-400 uppercase">Room ${s.roomName}</p></div>
                    <div class="flex gap-2">
                        <button onclick="markMess('${s.id}', 'breakfast')" class="w-9 h-9 rounded-xl font-bold text-[10px] ${a.breakfast ? 'btn-b text-white shadow-lg' : 'bg-slate-50 text-slate-300'}">B</button>
                        <button onclick="markMess('${s.id}', 'lunch')" class="w-9 h-9 rounded-xl font-bold text-[10px] ${a.lunch ? 'btn-l text-white shadow-lg' : 'bg-slate-50 text-slate-300'}">L</button>
                        <button onclick="markMess('${s.id}', 'dinner')" class="w-9 h-9 rounded-xl font-bold text-[10px] ${a.dinner ? 'btn-d text-white shadow-lg' : 'bg-slate-50 text-slate-300'}">D</button>
                    </div>
                </div>
            `;
        }).join('');
        stats.innerHTML = `<div class="bg-orange-50 p-2 rounded-xl text-center border border-orange-100"><p class="text-[8px] font-bold uppercase text-orange-600">B: ${b}</p></div><div class="bg-blue-50 p-2 rounded-xl text-center border border-blue-100"><p class="text-[8px] font-bold uppercase text-blue-600">L: ${l}</p></div><div class="bg-purple-50 p-2 rounded-xl text-center border border-purple-100"><p class="text-[8px] font-bold uppercase text-purple-600">D: ${d}</p></div>`;
    }

    function markMess(id, type) {
        let a = state.attendance.find(x => x.studentId === id && x.date === messDate);
        if(!a) { a = { studentId: id, date: messDate, breakfast: false, lunch: false, dinner: false }; state.attendance.push(a); }
        a[type] = !a[type];
        sync(); updateMessList(document.getElementById('messSearch').value);
    }

    // --- VIEW 4: FINANCE ---
    function renderFinance(el) {
        el.innerHTML = `
            <div class="fade-in space-y-4">
                <div class="flex justify-between items-center"><h2 class="text-xl font-black text-slate-800">Fee Status</h2><input type="month" value="${filterMonth}" onchange="filterMonth=this.value; render()" class="text-xs font-black bg-white px-3 py-2 rounded-xl border border-slate-100 shadow-sm"></div>
                <div class="space-y-3">${state.students.map(s => {
                    const paid = state.payments.filter(p => p.studentId === s.id && p.month === filterMonth).reduce((sum,p)=>sum+p.total,0);
                    const total = s.hFee + s.mFee;
                    const bal = total - paid;
                    return `
                        <div class="bg-white p-5 rounded-[1.5rem] flex justify-between items-center card-shadow border border-slate-100">
                            <div><h4 class="text-sm font-black text-slate-800">${s.name}</h4><p class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Room ${s.roomName} • Rs. ${total}</p></div>
                            ${bal <= 0 ? `<span class="bg-emerald-50 text-emerald-600 px-3 py-1.5 rounded-xl text-[9px] font-black uppercase">PAID</span>` : 
                            `<button onclick="collectFee('${s.id}')" class="bg-rose-50 text-rose-600 px-3 py-1.5 rounded-xl text-[9px] font-black uppercase shadow-sm">Rs. ${bal} DUE</button>`}
                        </div>
                    `;
                }).join('')}</div>
            </div>
        `;
    }

    // --- VIEW 5: REPORTS ---
    function renderReports(el) {
        el.innerHTML = `
            <div class="fade-in space-y-6">
                <h2 class="text-xl font-black text-slate-800">Reports Engine</h2>
                <div class="bg-white p-6 rounded-[2.5rem] card-shadow border border-slate-100 space-y-4">
                    <div class="p-4 bg-slate-50 rounded-2xl space-y-3">
                        <p class="text-[10px] font-black text-slate-400 uppercase">Set Context</p>
                        <input type="date" value="${messDate}" onchange="messDate=this.value" class="w-full p-3 rounded-xl border shadow-sm text-xs font-bold">
                        <input type="month" value="${filterMonth}" onchange="filterMonth=this.value" class="w-full p-3 rounded-xl border shadow-sm text-xs font-bold">
                    </div>
                    <div class="grid grid-cols-1 gap-2">
                        <button onclick="genMessPdf('daily')" class="w-full bg-slate-100 text-slate-700 p-4 rounded-xl font-black text-xs text-left">Daily Mess Log</button>
                        <button onclick="genMessPdf('weekly')" class="w-full bg-slate-100 text-slate-700 p-4 rounded-xl font-black text-xs text-left">Weekly Mess Summary (7 Days)</button>
                        <button onclick="genMessPdf('monthly')" class="w-full bg-slate-100 text-slate-700 p-4 rounded-xl font-black text-xs text-left">Monthly Mess Analysis</button>
                        <hr class="my-2 border-slate-100">
                        <button onclick="genFinPdf('paid')" class="w-full bg-emerald-600 text-white p-4 rounded-xl font-black text-xs text-left">Current Month Paid List</button>
                        <button onclick="genFinPdf('defaulters')" class="w-full bg-rose-600 text-white p-4 rounded-xl font-black text-xs text-left">Monthly Defaulters List</button>
                    </div>
                </div>
            </div>
        `;
    }

    // --- VIEW 6: FORM (ADD/EDIT) ---
    function renderForm(el) {
        const isEdit = currentTab === 'edit';
        const s = isEdit ? state.students.find(x => x.id === activeStudentId) : null;
        el.innerHTML = `
            <div class="fade-in bg-white p-8 rounded-[2.5rem] card-shadow border border-slate-100">
                <h2 class="text-xl font-black text-slate-800 mb-8">${isEdit ? 'Modify Resident' : 'New Registration'}</h2>
                <form id="studentForm" class="space-y-5">
                    <div class="flex flex-col items-center mb-6"><label class="cursor-pointer relative">
                        <img id="preview" src="${s?.photo || 'https://via.placeholder.com/150'}" class="w-28 h-28 rounded-[2rem] object-cover border-4 border-slate-50 shadow-md">
                        <input type="file" id="photoInput" accept="image/*" class="hidden">
                        <input type="hidden" name="photo" id="photoData" value="${s?.photo || ''}">
                    </label></div>
                    <div class="space-y-1"><label class="text-[10px] font-black text-slate-400 ml-2 uppercase">Full Name</label><input name="name" value="${s?.name || ''}" required class="w-full p-4 bg-slate-50 border-none rounded-2xl text-sm font-bold"></div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1"><label class="text-[10px] font-black text-slate-400 ml-2 uppercase">Room</label><input name="roomName" value="${s?.roomName || ''}" required class="w-full p-4 bg-slate-50 border-none rounded-2xl text-sm font-bold"></div>
                        <div class="space-y-1"><label class="text-[10px] font-black text-slate-400 ml-2 uppercase">WhatsApp</label><input name="phone" value="${s?.phone || ''}" required class="w-full p-4 bg-slate-50 border-none rounded-2xl text-sm font-bold"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1"><label class="text-[10px] font-black text-slate-400 ml-2 uppercase">Rent</label><input type="number" name="hFee" value="${s?.hFee || 6000}" class="w-full p-4 bg-slate-50 border-none rounded-2xl text-sm font-black"></div>
                        <div class="space-y-1"><label class="text-[10px] font-black text-slate-400 ml-2 uppercase">Mess</label><input type="number" name="mFee" value="${s?.mFee || 5000}" class="w-full p-4 bg-slate-50 border-none rounded-2xl text-sm font-black"></div>
                    </div>
                    <button type="submit" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase text-sm tracking-widest">${isEdit ? 'Update Details' : 'Register Now'}</button>
                </form>
            </div>
        `;
        document.getElementById('photoInput').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => { document.getElementById('preview').src = ev.target.result; document.getElementById('photoData').value = ev.target.result; };
            reader.readAsDataURL(e.target.files[0]);
        };
        document.getElementById('studentForm').onsubmit = (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const data = { id: isEdit ? activeStudentId : 'ST' + Date.now(), name: fd.get('name'), roomName: fd.get('roomName'), phone: fd.get('phone'), hFee: Number(fd.get('hFee')), mFee: Number(fd.get('mFee')), photo: fd.get('photo'), joined: s?.joined || new Date().toISOString().split('T')[0] };
            if(isEdit) state.students = state.students.map(x => x.id === activeStudentId ? data : x);
            else state.students.push(data);
            sync(); currentTab = 'rooms'; render();
        };
    }

    // --- VIEW 7: PROFILE ---
    function renderProfile(el) {
        const s = state.students.find(x => x.id === activeStudentId);
        if(!s) return;
        const meals = state.attendance.filter(a => a.studentId === s.id && a.date.startsWith(filterMonth));
        const mealCount = meals.reduce((sum, a) => sum + (a.breakfast?1:0) + (a.lunch?1:0) + (a.dinner?1:0), 0);

        el.innerHTML = `
            <div class="fade-in space-y-6 pb-10">
                <div class="bg-white p-8 rounded-[3rem] text-center shadow-xl border border-slate-100">
                    <img src="${s.photo || 'https://via.placeholder.com/150'}" class="w-28 h-28 rounded-[2.5rem] object-cover mx-auto border-4 border-white shadow-lg mb-4">
                    <h2 class="text-2xl font-black text-slate-800">${s.name}</h2>
                    <span class="bg-emerald-50 text-emerald-700 text-[10px] font-black px-4 py-1 rounded-full uppercase">Room ${s.roomName}</span>
                    
                    <div class="grid grid-cols-2 gap-4 mt-8">
                        <div class="p-4 bg-slate-50 rounded-2xl border"><p class="text-2xl font-black">${mealCount}</p><p class="text-[9px] font-bold text-slate-400 uppercase">Meals (Month)</p></div>
                        <div class="p-4 bg-slate-50 rounded-2xl border"><p class="text-2xl font-black">${s.hFee+s.mFee}</p><p class="text-[9px] font-bold text-slate-400 uppercase">Total Dues</p></div>
                    </div>

                    <div class="grid grid-cols-2 gap-3 mt-6">
                        <a href="tel:${s.phone}" class="bg-emerald-600 text-white p-3.5 rounded-2xl font-black text-xs">CALL</a>
                        <button onclick="currentTab='edit'; render()" class="bg-slate-100 text-slate-600 p-3.5 rounded-2xl font-black text-xs">EDIT</button>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-[2.5rem] border border-slate-100">
                    <h3 class="text-xs font-black uppercase text-slate-400 mb-4 tracking-widest">Payments History</h3>
                    <div class="space-y-3">
                        ${state.payments.filter(p=>p.studentId===s.id).map(p=>`
                            <div class="flex justify-between items-center bg-slate-50 p-4 rounded-xl border">
                                <div><p class="text-xs font-black text-slate-700 uppercase">${new Date(p.month+'-01').toLocaleString('default',{month:'short', year:'numeric'})}</p><p class="text-[9px] text-slate-400 font-bold">${p.date}</p></div>
                                <div class="text-right"><p class="text-sm font-black text-emerald-700">Rs. ${p.total}</p><button onclick="getReceipt('${p.id}')" class="text-[9px] text-slate-400 underline">Receipt</button></div>
                            </div>
                        `).join('') || '<p class="text-center text-[10px] text-slate-400 py-6">No payments yet.</p>'}
                    </div>
                </div>
                <button onclick="deleteStudent('${s.id}')" class="w-full text-rose-500 font-black text-[10px] uppercase tracking-widest py-4">Permanently Delete Resident</button>
            </div>
        `;
    }

    // --- CORE LOGIC & PDF UTILITIES ---

    function openProfile(id) { activeStudentId = id; currentTab = 'profile'; render(); }
    function collectFee(id) {
        const s = state.students.find(x => x.id === id);
        const paid = state.payments.filter(p => p.studentId === s.id && p.month === filterMonth).reduce((sum,p)=>sum+p.total,0);
        const due = (s.hFee + s.mFee) - paid;
        const amt = prompt(`Collect Fee for ${s.name}\nMonth: ${filterMonth}\nDue: ${due}`, due);
        if(amt && !isNaN(amt)) {
            state.payments.push({ id: 'TXN'+Date.now(), studentId: id, month: filterMonth, date: new Date().toLocaleDateString('en-GB'), total: Number(amt) });
            sync(); render();
        }
    }

    function deleteStudent(id) { if(confirm("Are you sure? All history will be deleted.")) { state.students = state.students.filter(x=>x.id!==id); state.payments = state.payments.filter(p=>p.studentId!==id); sync(); currentTab='rooms'; render(); } }

    function genMessPdf(type) {
        let title = "", start, end;
        if(type === 'daily') { title = `Daily Mess: ${messDate}`; start = messDate; end = messDate; }
        else if (type === 'weekly') { const d = new Date(messDate); d.setDate(d.getDate() - 6); start = d.toISOString().split('T')[0]; end = messDate; title = `Weekly Mess: ${start} to ${end}`; }
        else { start = `${filterMonth}-01`; end = `${filterMonth}-31`; title = `Monthly Mess: ${filterMonth}`; }

        const rows = state.students.map(s => {
            const meals = state.attendance.filter(a => a.studentId === s.id && a.date >= start && a.date <= end);
            const b = meals.filter(m => m.breakfast).length;
            const l = meals.filter(m => m.lunch).length;
            const d = meals.filter(m => m.dinner).length;
            return `<tr><td>${s.roomName}</td><td>${s.name}</td><td>${b}</td><td>${l}</td><td>${d}</td><td>${b+l+d}</td></tr>`;
        }).join('');

        const win = window.open('', '_blank');
        win.document.write(`<html><head><style>body{font-family:sans-serif;padding:30px} table{width:100%;border-collapse:collapse;margin-top:20px} th,td{border:1px solid #eee;padding:12px;text-align:left} th{background:#f8fafc;font-size:12px} h1{color:#059669}</style></head><body><h1>Indus Hostel</h1><p>${title}</p><table><thead><tr><th>Room</th><th>Name</th><th>B</th><th>L</th><th>D</th><th>Total</th></tr></thead><tbody>${rows}</tbody></table><script>window.print();<\/script></body></html>`);
        win.document.close();
    }

    function genFinPdf(type) {
        const title = type === 'paid' ? `Paid List: ${filterMonth}` : `Defaulters List: ${filterMonth}`;
        const rows = state.students.filter(s => {
            const paid = state.payments.filter(p => p.studentId === s.id && p.month === filterMonth).reduce((sum,px)=>sum+px.total,0);
            return type === 'paid' ? paid >= (s.hFee + s.mFee) : paid < (s.hFee + s.mFee);
        }).map(s => {
            const paid = state.payments.filter(p => p.studentId === s.id && p.month === filterMonth).reduce((sum,px)=>sum+px.total,0);
            return `<tr><td>${s.roomName}</td><td>${s.name}</td><td>${s.phone}</td><td>Rs. ${paid}</td><td>Rs. ${(s.hFee+s.mFee)-paid}</td></tr>`;
        }).join('');
        const win = window.open('', '_blank');
        win.document.write(`<html><head><style>body{font-family:sans-serif;padding:30px} table{width:100%;border-collapse:collapse} th,td{border:1px solid #eee;padding:12px;text-align:left} th{background:#f8fafc}</style></head><body><h1>${title}</h1><table><thead><tr><th>Room</th><th>Name</th><th>Phone</th><th>Paid</th><th>Balance</th></tr></thead><tbody>${rows}</tbody></table><script>window.print();<\/script></body></html>`);
        win.document.close();
    }

    async function getReceipt(pId) {
        const p = state.payments.find(x => x.id === pId);
        const s = state.students.find(x => x.id === p.studentId);
        const container = document.getElementById('captureArea');
        container.innerHTML = `
            <div class="receipt-container p-0" id="rcpt">
                <div class="bg-emerald-700 text-white p-6">
                    <h1 class="text-2xl font-black uppercase">The Indus Boys Hostel</h1>
                    <p class="text-[10px] tracking-widest font-bold opacity-80 uppercase">Sukkur, Sindh • Official Voucher</p>
                </div>
                <div class="p-10 space-y-6">
                    <div class="flex justify-between border-b pb-4 text-slate-800">
                        <div><p class="text-[10px] text-slate-400 font-bold uppercase">Resident</p><p class="text-lg font-black">${s.name.toUpperCase()}</p></div>
                        <div class="text-right"><p class="text-[10px] text-slate-400 font-bold uppercase">Room</p><p class="text-lg font-black">${s.roomName}</p></div>
                    </div>
                    <div class="grid grid-cols-2">
                        <div><p class="text-[10px] text-slate-400 font-bold uppercase">Billing Period</p><p class="text-sm font-black">${p.month}</p></div>
                        <div class="text-right"><p class="text-[10px] text-slate-400 font-bold uppercase">Date</p><p class="text-sm font-black">${p.date}</p></div>
                    </div>
                    <div class="bg-emerald-50 p-6 rounded-2xl flex justify-between items-center border border-emerald-100">
                        <span class="text-emerald-700 font-black">AMOUNT PAID</span>
                        <span class="text-emerald-800 font-black text-3xl">RS. ${p.total}/-</span>
                    </div>
                </div>
                <div class="px-10 pb-10 text-[9px] text-slate-300 italic">This is a system generated document.</div>
            </div>
        `;
        const blob = await htmlToImage.toPng(document.getElementById('rcpt'));
        const a = document.createElement('a');
        a.download = `IH_Receipt_${s.name.replace(/\s/g, '_')}.png`; a.href = blob; a.click();
    }

    // Startup
    render();
  </script>
</body>
</html>
