    function getPeakDay() {
        if (state.attendance.length === 0) return "No Data";
        const counts = {};
        state.attendance.forEach(a => {
            const day = new Intl.DateTimeFormat('en-US', { weekday: 'long' }).format(new Date(a.date));
            counts[day] = (counts[day] || 0) + (a.breakfast?1:0) + (a.lunch?1:0) + (a.dinner?1:0);
        });
        const peak = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b, "Monday");
        return peak;
    }

        else if (currentTab === 'add' || currentTab === 'edit') renderForm(app);

                    </div>

                return `
                    <div class="bg-white p-4 rounded-3xl flex items-center justify-between card-shadow">
                        <div class="flex flex-col">
                            <p class="text-xs font-black text-slate-800">${s.name}</p>
                            <p class="text-[8px] font-bold text-slate-400 uppercase">${s.roomName}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="toggleMessStatus('${s.id}', 'breakfast')" class="w-10 h-10 rounded-xl font-bold text-[10px] transition-all ${a.breakfast?'bg-orange-500 text-white shadow-lg shadow-orange-100':'bg-slate-100 text-slate-400'}">B</button>
                            <button onclick="toggleMessStatus('${s.id}', 'lunch')" class="w-10 h-10 rounded-xl font-bold text-[10px] transition-all ${a.lunch?'bg-blue-500 text-white shadow-lg shadow-blue-100':'bg-slate-100 text-slate-400'}">L</button>
                            <button onclick="toggleMessStatus('${s.id}', 'dinner')" class="w-10 h-10 rounded-xl font-bold text-[10px] transition-all ${a.dinner?'bg-emerald-500 text-white shadow-lg shadow-emerald-100':'bg-slate-100 text-slate-400'}">D</button>
                        </div>
                    </div>`;
            }).join('');
        };

        document.getElementById('mSearch').oninput = drawMessList;
        drawMessList();
    }

    function toggleMessStatus(sid, type) {
        let a = state.attendance.find(x => x.studentId === sid && x.date === messDate);
        if(!a) {
            a = { studentId: sid, date: messDate, breakfast: false, lunch: false, dinner: false };
            state.attendance.push(a);
        }
        a[type] = !a[type];
        sync();
        
        // Lightweight UI Update instead of full render
        const btn = event.currentTarget;
        const colors = { breakfast: 'bg-orange-500', lunch: 'bg-blue-500', dinner: 'bg-emerald-500' };
        if (a[type]) {
            btn.classList.remove('bg-slate-100', 'text-slate-400');
            btn.classList.add(colors[type], 'text-white', 'shadow-lg');
        } else {
            btn.classList.add('bg-slate-100', 'text-slate-400');
            btn.classList.remove(colors[type], 'text-white', 'shadow-lg');
        }
    }

    function renderProfile(el) {
        const s = state.students.find(x=>x.id===activeStudentId);
        if(!s) return;
        const payments = state.payments.filter(p=>p.studentId===s.id);
        el.innerHTML = `
            <div class="fade-in space-y-6">
                <div class="bg-white p-8 rounded-[3rem] text-center card-shadow">
                    <img src="${s.photo}" class="w-24 h-24 rounded-[2rem] mx-auto mb-4 object-cover border-4 border-white shadow-lg">
                    <h2 class="text-xl font-black text-slate-800">${s.name}</h2>
                    <p class="text-xs font-bold text-slate-400 uppercase mb-6">${s.roomName} • ${s.phone}</p>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="genStudentMessPdf('${s.id}')" class="bg-orange-500 text-white p-3 rounded-xl text-[10px] font-black uppercase"><i class="fas fa-file-pdf mr-1"></i> Mess Log</button>
                        <button onclick="sendWhatsApp('${s.id}')" class="bg-emerald-600 text-white p-3 rounded-xl text-[10px] font-black uppercase"><i class="fab fa-whatsapp mr-1"></i> Message</button>
                    </div>
                </div>
                
                <div class="bg-white p-6 rounded-3xl card-shadow space-y-4">
                    <div class="flex justify-between items-center"><p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Fee Records</p><button onclick="collectFee('${s.id}')" class="text-emerald-600 text-[10px] font-black uppercase">+ Add Payment</button></div>
                    <div class="space-y-2">
                        ${payments.length ? payments.map(p => `
                            <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl">
                                <div><p class="text-xs font-black text-slate-800">Rs. ${p.total}</p><p class="text-[9px] text-slate-400 font-bold">${p.date} (${p.month})</p></div>
                                <button onclick="genReceipt('${p.id}')" class="text-slate-400 text-[10px] font-black"><i class="fas fa-download"></i></button>
                            </div>
                        `).join('') : '<p class="text-center py-4 text-xs font-bold text-slate-300 uppercase tracking-widest">No history</p>'}
                    </div>
                </div>

                <button onclick="currentTab='edit'; render()" class="w-full bg-slate-900 text-white p-4 rounded-2xl text-[10px] font-black uppercase">Edit Resident Details</button>
            </div>
        `;
    }

    function renderFinance(el) {
        el.innerHTML = `
            <div class="fade-in space-y-4">
                <div class="flex justify-between items-center"><h2 class="text-xl font-black text-slate-800">Fee Ledger</h2><input type="month" value="${filterMonth}" onchange="filterMonth=this.value; render()" class="text-xs font-black bg-white px-3 py-2 rounded-xl border-none card-shadow"></div>
                <div class="space-y-3">${state.students.map(s=>{
                    const paid = state.payments.filter(p=>p.studentId===s.id && p.month===filterMonth).reduce((sum,p)=>sum+p.total,0);
                    const total = s.hFee + s.mFee;
                    const bal = total - paid;
                    return `<div class="bg-white p-5 rounded-[2rem] flex justify-between items-center card-shadow">
                        <div><p class="text-sm font-black text-slate-800">${s.name}</p><p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Rent: Rs. ${s.hFee} / Mess: Rs. ${s.mFee}</p></div>
                        ${bal<=0 ? `<span class="bg-emerald-100 text-emerald-600 px-3 py-1.5 rounded-xl text-[10px] font-black uppercase">Paid</span>` : `<button onclick="collectFee('${s.id}')" class="bg-rose-50 text-rose-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest">Rs. ${bal} Due</button>`}
                    </div>`;
                }).join('')}</div>
            </div>`;
    }

    function collectFee(id) {
        const s = state.students.find(x=>x.id===id);
        const paidSoFar = state.payments.filter(p=>p.studentId===s.id && p.month===filterMonth).reduce((sum,p)=>sum+p.total,0);
        const remaining = (s.hFee + s.mFee) - paidSoFar;
        
        const amt = prompt(`Collect payment for ${s.name} (${filterMonth}):`, remaining);
        if(amt && !isNaN(amt)) {
            state.payments.push({ id:'TXN'+Date.now(), studentId:id, month:filterMonth, date:new Date().toLocaleDateString('en-GB'), total:Number(amt) });
            sync(); render();
        }
    }

    function sendWhatsApp(id) {
        const s = state.students.find(x => x.id === id);
        const paid = state.payments.filter(p => p.studentId === s.id && p.month === filterMonth).reduce((sum, p) => sum + p.total, 0);
        const total = s.hFee + s.mFee;
        const bal = total - paid;
        
        // Formatting Month Name
        const dateObj = new Date(filterMonth + "-01");
        const monthName = dateObj.toLocaleString('default', { month: 'long', year: 'numeric' });

        const msg = `*Assalam-o-Alaikum ${s.name}*\n\n` +
                    `This is a reminder from *Indus Boys Hostel Sukkur* for the month of *${monthName}*.\n\n` +
                    `*Fee Summary:*\n` +
                    `- Total Payable: Rs. ${total}\n` +
                    `- Amount Paid: Rs. ${paid}\n` +
                    `---------------------------\n` +
                    `- *Remaining Balance: Rs. ${bal}*\n` +
                    `---------------------------\n` +
                    `Please clear your dues at the office. We appreciate your cooperation.\n` +
                    `_This is system generated message_\n\n` +
                    `*Management, Indus Boys Hostel*`;

        const encodedMsg = encodeURIComponent(msg);
        const phone = s.phone.startsWith('0') ? '92' + s.phone.substring(1) : s.phone;
        window.open(`https://wa.me/${phone}?text=${encodedMsg}`, '_blank');
    }

    function renderMenu(el) {
        const days = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
        el.innerHTML = `<div class="fade-in space-y-6">
            <h2 class="text-xl font-black text-slate-800">Weekly Food Menu</h2>
            <div class="space-y-4">${days.map(d=>`
                <div class="bg-white p-5 rounded-[2.5rem] card-shadow">
                    <p class="text-sm font-black text-slate-800 mb-3">${d}</p>
                    <div class="grid grid-cols-3 gap-2">
                        <div class="bg-slate-50 p-3 rounded-2xl text-center"><p class="text-[7px] font-bold text-slate-400 uppercase mb-1">Breakfast</p><p class="text-[10px] font-black leading-tight">${WEEKLY_MENU[d].breakfast}</p></div>
                        <div class="bg-slate-50 p-3 rounded-2xl text-center"><p class="text-[7px] font-bold text-slate-400 uppercase mb-1">Lunch</p><p class="text-[10px] font-black leading-tight">${WEEKLY_MENU[d].lunch}</p></div>
                        <div class="bg-slate-50 p-3 rounded-2xl text-center"><p class="text-[7px] font-bold text-slate-400 uppercase mb-1">Dinner</p><p class="text-[10px] font-black leading-tight">${WEEKLY_MENU[d].dinner}</p></div>
                    </div>
                </div>`).join('')}</div>
        </div>`;
    }

    function renderReports(el) {
        el.innerHTML = `
            <div class="fade-in space-y-6">
                <h2 class="text-xl font-black text-slate-800">Reports Center</h2>
                <div class="bg-white p-6 rounded-[2.5rem] card-shadow space-y-4">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Select Month</p>
                    <input type="month" id="repMonth" class="w-full p-4 bg-slate-50 rounded-2xl text-sm font-bold border-none" value="${filterMonth}">
                    <div class="grid gap-2">
                        <button onclick="genPdf('finance')" class="bg-slate-900 text-white p-4 rounded-2xl text-xs font-black uppercase flex justify-between items-center">Monthly Finance <i class="fas fa-file-invoice-dollar"></i></button>
                        <button onclick="genGlobalMessLog()" class="bg-emerald-600 text-white p-4 rounded-2xl text-xs font-black uppercase flex justify-between items-center">Monthly Mess Activity <i class="fas fa-calendar-alt"></i></button>
                        <button onclick="genPdf('defaulters')" class="bg-rose-600 text-white p-4 rounded-2xl text-xs font-black uppercase flex justify-between items-center">Defaulters List <i class="fas fa-exclamation-circle"></i></button>
                    </div>
                </div>
            </div>
        `;
    }

    function genGlobalMessLog() {
        const month = document.getElementById('repMonth').value;
        const doc = new jsPDF();
        doc.setFontSize(18); doc.text("INDUS BOYS HOSTEL SUKKUR", 14, 20);
        doc.setFontSize(11); doc.text(`Full Monthly Mess Consumption Log - ${month}`, 14, 28);
        const data = state.attendance.filter(a => a.date.startsWith(month)).sort((a,b)=>a.date.localeCompare(b.date)).map(a => {
            const s = state.students.find(x => x.id === a.studentId) || {name: "??", roomName: "???"};
            return [a.date, s.roomName, s.name, a.breakfast?'✓':'-', a.lunch?'✓':'-', a.dinner?'✓':'-'];
        });
        doc.autoTable({ head:[['Date','Room','Resident','B','L','D']], body:data, startY:35, headStyles:{fillColor:[5,150,105]}, theme:'grid' });
        doc.save(`Monthly_Mess_Log_${month}.pdf`);
    }

    function genStudentMessPdf(id) {
        const s = state.students.find(x=>x.id===id);
        const doc = new jsPDF();
        doc.setFontSize(18); doc.text("INDUS BOYS HOSTEL SUKKUR", 14, 20);
        doc.setFontSize(11); doc.text(`Personal Mess Log: ${s.name} (Room ${s.roomName})`, 14, 28);
        const data = state.attendance.filter(a=>a.studentId===id && a.date.startsWith(filterMonth)).sort((a,b)=>a.date.localeCompare(b.date)).map(a=> [a.date, a.breakfast?'Yes':'-', a.lunch?'Yes':'-', a.dinner?'Yes':'-']);
        doc.autoTable({ head: [['Date', 'Breakfast', 'Lunch', 'Dinner']], body:data, startY:35, headStyles:{fillColor:[249, 115, 22]} });
        doc.save(`${s.name}_Mess_${filterMonth}.pdf`);
    }

    function genPdf(type) {
        const month = document.getElementById('repMonth').value;
        const doc = new jsPDF();
        doc.setFontSize(18); doc.text("INDUS BOYS HOSTEL SUKKUR", 14, 20);
        doc.setFontSize(10); doc.text(`${type.toUpperCase()} REPORT - ${month}`, 14, 28);
        let head = [], body = [];
        if(type==='finance') {
            head = [['Room', 'Name', 'Expected', 'Paid', 'Balance']];
            body = state.students.map(s => {
                const paid = state.payments.filter(p=>p.studentId===s.id && p.month===month).reduce((sum,p)=>sum+p.total,0);
                return [s.roomName, s.name, (s.hFee+s.mFee), paid, (s.hFee+s.mFee)-paid];
            });
        } else if(type==='defaulters') {
            head = [['Room', 'Name', 'Phone', 'Pending Amount']];
            body = state.students.filter(s=>{
                const paid = state.payments.filter(p=>p.studentId===s.id && p.month===month).reduce((sum,p)=>sum+p.total,0);
                return paid < (s.hFee+s.mFee);
            }).map(s => [s.roomName, s.name, s.phone, (s.hFee+s.mFee)-state.payments.filter(p=>p.studentId===s.id && p.month===month).reduce((sum,p)=>sum+p.total,0)]);
        }
        doc.autoTable({ head, body, startY: 35 });
        doc.save(`${type}_${month}.pdf`);
    }

    function genReceipt(payId) {
        const p = state.payments.find(x=>x.id===payId);
        const s = state.students.find(x=>x.id===p.studentId);
        const doc = new jsPDF({ unit:'mm', format:[80,100] });
        doc.setFontSize(12); doc.text("INDUS HOSTEL RECEIPT", 40, 15, {align:'center'});
        doc.setFontSize(8); doc.text(`Student: ${s.name}`, 10, 30);
        doc.text(`Room: ${s.roomName}`, 10, 35);
        doc.text(`Date: ${p.date} (${p.month})`, 10, 40);
        doc.setFontSize(12); doc.text(`PAID: RS. ${p.total}`, 40, 60, {align:'center'});
        doc.setFontSize(6); doc.text("System Generated Receipt", 40, 90, {align:'center'});
        doc.save(`Receipt_${s.name}.pdf`);
    }

    function renderForm(el) {
        const isEdit = currentTab === 'edit';
        const s = isEdit ? state.students.find(x=>x.id===activeStudentId) : null;
        const photoUrl = s?.photo || DEFAULT_IMG;

        el.innerHTML = `<div class="fade-in bg-white p-8 rounded-[2.5rem] card-shadow">
            <h2 class="text-xl font-black text-slate-800 mb-8 uppercase tracking-widest">${isEdit?'Update':'Register'} Resident</h2>
            <form id="studentForm" class="space-y-4">
                <div class="flex flex-col items-center mb-6">
                    <div class="relative group cursor-pointer" onclick="document.getElementById('photoInput').click()">
                        <img id="profilePreview" src="${photoUrl}" class="w-24 h-24 rounded-[2rem] object-cover border-4 border-emerald-50 shadow-lg">
                        <div class="absolute inset-0 bg-black/40 rounded-[2rem] flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                            <i class="fas fa-camera text-white"></i>
                        </div>
                    </div>
                    <input type="file" id="photoInput" accept="image/*" class="hidden" onchange="previewPhoto(this)">
                </div>
                <input name="name" value="${s?.name||''}" placeholder="Full Name" required class="w-full p-4 bg-slate-50 rounded-2xl text-sm font-bold border-none">
                <input name="roomName" value="${s?.roomName||''}" placeholder="Room Name (e.g. FFR 01)" required class="w-full p-4 bg-slate-50 rounded-2xl text-sm font-bold border-none">
                <input name="phone" value="${s?.phone||''}" placeholder="WhatsApp No (03xxxxxxxxx)" required class="w-full p-4 bg-slate-50 rounded-2xl text-sm font-bold border-none">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" name="hFee" value="${s?.hFee||0}" placeholder="Hostel Fee" class="w-full p-4 bg-slate-50 rounded-2xl text-sm font-bold border-none">
                    <input type="number" name="mFee" value="${s?.mFee||0}" placeholder="Mess Fee" class="w-full p-4 bg-slate-50 rounded-2xl text-sm font-bold border-none">
                </div>
                <button type="submit" class="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black uppercase text-sm tracking-widest shadow-lg shadow-emerald-100">${isEdit?'Save Changes':'Register Resident'}</button>
            </form>
        </div>`;

        document.getElementById('studentForm').onsubmit = (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const data = { 
                id: isEdit ? activeStudentId : 'ST' + Date.now(), 
                name: fd.get('name'), 
                roomName: fd.get('roomName'), 
                phone: fd.get('phone'), 
                hFee: Number(fd.get('hFee')), 
                mFee: Number(fd.get('mFee')), 
                photo: document.getElementById('profilePreview').src, 
                joined: s?.joined || new Date().toISOString().split('T')[0] 
            };
            if(isEdit) state.students = state.students.map(x => x.id === activeStudentId ? data : x);
            else state.students.push(data);
            sync(); changeTab('rooms');
        };
    }

    window.previewPhoto = (input) => {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => document.getElementById('profilePreview').src = e.target.result;
            reader.readAsDataURL(input.files[0]);
        }
    };

    // Initialize App
    changeTab('dashboard');
  </script>
</body>
</html>
