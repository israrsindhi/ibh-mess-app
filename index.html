<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Indus Hostel | Ultimate Management</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
    .tab-active { color: #2c7a3f; border-top: 4px solid #2c7a3f; background: #f0fdf4; }
    .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); }
    
    .btn-b { background-color: #f97316; } 
    .btn-l { background-color: #3b82f6; } 
    .btn-d { background-color: #a855f7; } 

    .receipt-container {
      width:650px; background:#fff; border:3px solid #2c7a3f; padding:0; position:relative; font-family: Arial, sans-serif;
    }
    .receipt-header { background:#2c7a3f; color:#fff; display:flex; align-items:center; padding:15px; }
    .receipt-title { font-size:24px; font-weight:bold; }
    .receipt-line { border-bottom:1px solid #000; display:inline-block; min-width:150px; padding-left:5px; }
    .receipt-amount-box { border:2px solid #2c7a3f; padding:10px 20px; font-size:24px; font-weight:bold; }
  </style>
</head>
<body class="antialiased">

  <div class="min-h-screen pb-24">
    <header class="sticky top-0 z-40 glass border-b border-slate-200 px-6 py-4 flex justify-between items-center shadow-sm">
      <div class="flex items-center gap-3">
        <div class="w-11 h-11 bg-[#2c7a3f] rounded-2xl flex items-center justify-center text-white shadow-lg shadow-emerald-200">
          <i class="fas fa-building-shield text-lg"></i>
        </div>
        <div>
          <h1 class="text-lg font-extrabold tracking-tight text-slate-800">Indus Boys Hostel</h1>
          <p class="text-[10px] uppercase font-black text-[#2c7a3f] tracking-[0.2em]">Sukkur Dashboard</p>
        </div>
      </div>
      <button id="globalBackBtn" class="hidden h-10 w-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-600">
        <i class="fas fa-arrow-left"></i>
      </button>
    </header>

    <main id="app" class="p-4 max-w-md mx-auto"></main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-slate-200 flex justify-around items-center py-3 z-50 shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
      <button data-tab="dashboard" class="nav-item flex flex-col items-center gap-1.5 px-4 text-slate-400">
        <i class="fas fa-chart-line text-xl"></i>
        <span class="text-[9px] font-bold">Home</span>
      </button>
      <button data-tab="rooms" class="nav-item flex flex-col items-center gap-1.5 px-4 text-slate-400">
        <i class="fas fa-people-roof text-xl"></i>
        <span class="text-[9px] font-bold">Residents</span>
      </button>
      <button data-tab="mess" class="nav-item flex flex-col items-center gap-1.5 px-4 text-slate-400">
        <i class="fas fa-plate-wheat text-xl"></i>
        <span class="text-[9px] font-bold">Mess</span>
      </button>
      <button data-tab="finance" class="nav-item flex flex-col items-center gap-1.5 px-4 text-slate-400">
        <i class="fas fa-money-check-dollar text-xl"></i>
        <span class="text-[9px] font-bold">Fees</span>
      </button>
      <button data-tab="reports" class="nav-item flex flex-col items-center gap-1.5 px-4 text-slate-400">
        <i class="fas fa-file-invoice text-xl"></i>
        <span class="text-[9px] font-bold">Reports</span>
      </button>
    </nav>
  </div>

  <div id="captureArea" class="fixed -left-[9999px] top-0"></div>

  <script>
    const DB_KEY = 'indus_v5_pro';
    let state = JSON.parse(localStorage.getItem(DB_KEY)) || { students: [], attendance: [], payments: [] };
    const sync = () => localStorage.setItem(DB_KEY, JSON.stringify(state));

    let currentTab = 'dashboard';
    let filterMonth = new Date().toISOString().slice(0, 7);
    let messDate = new Date().toISOString().split('T')[0];
    let activeStudent = null;

    const formatWA = (num) => {
      let clean = num.replace(/\D/g, '');
      return clean.startsWith('0') ? '92' + clean.slice(1) : clean;
    };
    const getMoName = (m) => new Date(m + '-01').toLocaleString('en-pk', { month: 'long', year: 'numeric' });

    // Function to generate professional WhatsApp message
    const getWhatsAppLink = (student, month) => {
      const totalDue = student.hFee + student.mFee;
      const paid = state.payments
        .filter(p => p.studentId === student.id && p.month === month)
        .reduce((sum, p) => sum + p.total, 0);
      const remaining = totalDue - paid;
      const monthName = getMoName(month);

      const msg = `*Assalam-o-Alaikum ${student.name}*%0A%0AThis is a respectful reminder from *Indus Boys Hostel Management* regarding your dues for the month of *${monthName}*.%0A%0A*Resident Details:*%0A- Room: ${student.roomName}%0A- Monthly Rent: Rs. ${student.hFee}%0A- Mess Charges: Rs. ${student.mFee}%0A---------------------------%0A- *Total Fee: Rs. ${totalDue}*%0A- *Amount Paid: Rs. ${paid}*%0A- *Remaining Dues: Rs. ${remaining}*%0A---------------------------%0A%0APlease clear your outstanding dues as soon as possible as the scheduled time is over. We appreciate your cooperation in maintaining hostel services.%0A%0A_Note: This is a system generated message._%0A*Indus Hostel Management*`;
      
      return `https://wa.me/${formatWA(student.phone)}?text=${msg}`;
    };

    function render() {
      const app = document.getElementById('app');
      document.getElementById('globalBackBtn').classList.toggle('hidden', !['add', 'profile', 'edit'].includes(currentTab));

      if (currentTab === 'dashboard') renderDash(app);
      else if (currentTab === 'rooms') renderRooms(app);
      else if (currentTab === 'add' || currentTab === 'edit') renderForm(app);
      else if (currentTab === 'profile') renderProfile(app);
      else if (currentTab === 'mess') renderMess(app);
      else if (currentTab === 'finance') renderFinance(app);
      else if (currentTab === 'reports') renderReports(app);

      document.querySelectorAll('.nav-item').forEach(n => {
        n.classList.toggle('tab-active', n.dataset.tab === currentTab);
      });
    }

    function renderDash(el) {
      const today = new Date().toISOString().split('T')[0];
      const messToday = state.attendance.filter(a => a.date === today);
      
      el.innerHTML = `
        <div class="space-y-6">
          <div class="flex justify-between items-end">
            <div>
               <h2 class="text-2xl font-black text-slate-800">Assalam-o-Alaikum</h2>
               <p class="text-xs font-semibold text-slate-400">Hostel Overview</p>
            </div>
            <div class="text-right">
               <span class="text-[10px] font-black bg-emerald-100 text-emerald-700 px-3 py-1.5 rounded-full uppercase tracking-tighter">${today}</span>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4">
             <div class="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase mb-1">Students</p>
                <p class="text-3xl font-black text-slate-800">${state.students.length}</p>
             </div>
             <div class="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase mb-1">Active Rooms</p>
                <p class="text-3xl font-black text-slate-800">${new Set(state.students.map(s=>s.roomName)).size}</p>
             </div>
          </div>

          <div class="bg-gradient-to-br from-[#2c7a3f] to-[#1e562c] p-6 rounded-[2.5rem] text-white shadow-xl shadow-emerald-100">
             <p class="text-xs font-bold opacity-70 mb-5 uppercase tracking-widest">Mess Demand Today</p>
             <div class="flex justify-between">
                <div class="text-center">
                   <p class="text-2xl font-black">${messToday.filter(a=>a.breakfast).length}</p>
                   <p class="text-[9px] font-bold text-orange-200">BREAKFAST</p>
                </div>
                <div class="w-px bg-white/10"></div>
                <div class="text-center">
                   <p class="text-2xl font-black">${messToday.filter(a=>a.lunch).length}</p>
                   <p class="text-[9px] font-bold text-blue-200">LUNCH</p>
                </div>
                <div class="w-px bg-white/10"></div>
                <div class="text-center">
                   <p class="text-2xl font-black">${messToday.filter(a=>a.dinner).length}</p>
                   <p class="text-[9px] font-bold text-purple-200">DINNER</p>
                </div>
             </div>
          </div>
        </div>
      `;
    }

    function renderRooms(el) {
      const rooms = {};
      state.students.forEach(s => {
        if (!rooms[s.roomName]) rooms[s.roomName] = [];
        rooms[s.roomName].push(s);
      });

      el.innerHTML = `
        <div class="space-y-6">
          <div class="flex justify-between items-center">
             <h2 class="text-xl font-black text-slate-800 tracking-tight">Resident Manager</h2>
             <button onclick="currentTab='add'; render()" class="text-xs font-bold text-[#2c7a3f]"><i class="fas fa-plus mr-1"></i> ADD NEW</button>
          </div>

          ${Object.keys(rooms).length ? Object.keys(rooms).map(room => `
             <div class="bg-white rounded-[2rem] border border-slate-200 overflow-hidden shadow-sm mb-4">
                <div class="bg-slate-50 px-5 py-3 flex justify-between items-center border-b border-slate-100">
                   <span class="text-[10px] font-black uppercase text-slate-400 tracking-widest">${room}</span>
                   <span class="text-[10px] font-bold text-emerald-700">${rooms[room].length} People</span>
                </div>
                <div class="divide-y divide-slate-50">
                   ${rooms[room].map(s => `
                      <div onclick="activeStudent='${s.id}'; currentTab='profile'; render()" class="px-5 py-4 flex items-center justify-between hover:bg-slate-50 transition cursor-pointer">
                         <div class="flex items-center gap-4">
                            <img src="${s.photo || 'https://via.placeholder.com/100'}" class="w-10 h-10 rounded-xl object-cover border border-slate-100">
                            <div>
                               <p class="text-sm font-bold text-slate-800">${s.name}</p>
                               <p class="text-[10px] text-slate-400 font-medium">${s.phone}</p>
                            </div>
                         </div>
                         <i class="fas fa-chevron-right text-slate-200 text-xs"></i>
                      </div>
                   `).join('')}
                </div>
             </div>
          `).join('') : '<p class="text-center py-20 text-slate-400 italic">No residents registered.</p>'}
        </div>
      `;
    }

    function renderForm(el) {
      const isEdit = currentTab === 'edit';
      const s = isEdit ? state.students.find(x => x.id === activeStudent) : null;

      el.innerHTML = `
        <div class="bg-white p-6 rounded-[2.5rem] border border-slate-200 shadow-sm">
          <h2 class="text-xl font-black mb-6">${isEdit ? 'Edit Resident & Fees' : 'Register Resident'}</h2>
          <form id="studentForm" class="space-y-4">
            <div class="flex flex-col items-center mb-6">
                <label class="cursor-pointer relative group">
                    <img id="preview" src="${s?.photo || 'https://via.placeholder.com/150'}" class="w-24 h-24 rounded-3xl object-cover border-4 border-slate-100 shadow-md">
                    <div class="absolute inset-0 bg-black/40 rounded-3xl opacity-0 group-hover:opacity-100 flex items-center justify-center text-white transition">
                        <i class="fas fa-camera"></i>
                    </div>
                    <input type="file" id="photoInput" accept="image/*" class="hidden">
                    <input type="hidden" name="photo" id="photoData" value="${s?.photo || ''}">
                </label>
                <p class="text-[9px] font-bold text-slate-400 mt-2 uppercase">Tap to upload photo</p>
            </div>
            
            <div class="space-y-1">
                <label class="text-[10px] font-black text-slate-400 ml-2 uppercase">Full Name</label>
                <input name="name" value="${s?.name || ''}" required class="w-full p-3.5 bg-slate-50 rounded-2xl text-sm border-none focus:ring-2 focus:ring-[#2c7a3f]">
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 ml-2 uppercase">Room</label>
                    <input name="roomName" value="${s?.roomName || ''}" placeholder="e.g. Room 10" required class="w-full p-3.5 bg-slate-50 rounded-2xl text-sm border-none focus:ring-2 focus:ring-[#2c7a3f]">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 ml-2 uppercase">Phone No</label>
                    <input name="phone" value="${s?.phone || ''}" placeholder="03xxxxxxxxx" required class="w-full p-3.5 bg-slate-50 rounded-2xl text-sm border-none focus:ring-2 focus:ring-[#2c7a3f]">
                </div>
            </div>

            <div class="bg-emerald-50/50 p-4 rounded-3xl space-y-4 border border-emerald-100">
                <p class="text-[10px] font-black text-emerald-700 uppercase px-2">Fee Configuration</p>
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 ml-2 uppercase tracking-tighter">Monthly Rent</label>
                        <input type="number" name="hFee" value="${s?.hFee || 6000}" class="w-full p-3.5 bg-white rounded-2xl text-sm border-none focus:ring-2 focus:ring-[#2c7a3f]">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 ml-2 uppercase tracking-tighter">Mess Charges</label>
                        <input type="number" name="mFee" value="${s?.mFee || 5000}" class="w-full p-3.5 bg-white rounded-2xl text-sm border-none focus:ring-2 focus:ring-[#2c7a3f]">
                    </div>
                </div>
            </div>

            <button type="submit" class="w-full bg-[#2c7a3f] text-white py-4 rounded-2xl font-black shadow-xl shadow-emerald-50 active:scale-95 transition">
               ${isEdit ? 'SAVE UPDATED DETAILS' : 'FINALIZE REGISTRATION'}
            </button>
          </form>
        </div>
      `;

      document.getElementById('photoInput').onchange = (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (ev) => {
            document.getElementById('preview').src = ev.target.result;
            document.getElementById('photoData').value = ev.target.result;
        };
        reader.readAsDataURL(file);
      };

      document.getElementById('studentForm').onsubmit = (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const data = {
            id: isEdit ? activeStudent : 'ST' + Date.now(),
            name: fd.get('name'),
            roomName: fd.get('roomName'),
            phone: fd.get('phone'),
            hFee: Number(fd.get('hFee')),
            mFee: Number(fd.get('mFee')),
            photo: fd.get('photo'),
            joined: s?.joined || new Date().toISOString().split('T')[0]
        };

        if(isEdit) state.students = state.students.map(x => x.id === activeStudent ? data : x);
        else state.students.push(data);
        
        sync(); currentTab = 'rooms'; render();
      };
    }

    function renderProfile(el) {
      const s = state.students.find(x => x.id === activeStudent);
      if(!s) return;
      const waLink = getWhatsAppLink(s, filterMonth);

      el.innerHTML = `
        <div class="space-y-6">
          <div class="bg-white p-6 rounded-[2.5rem] border border-slate-200 text-center shadow-sm relative">
             <div class="flex justify-center mb-4">
                <img src="${s.photo || 'https://via.placeholder.com/150'}" class="w-24 h-24 rounded-[2rem] object-cover border-4 border-white shadow-xl">
             </div>
             <h2 class="text-2xl font-black text-slate-800">${s.name}</h2>
             <p class="text-xs font-bold text-emerald-700 uppercase tracking-widest bg-emerald-50 inline-block px-4 py-1 rounded-full mt-1">${s.roomName}</p>
             
             <div class="grid grid-cols-2 gap-3 mt-6">
                <a href="tel:${s.phone}" class="bg-slate-100 text-slate-700 p-3 rounded-2xl flex items-center justify-center gap-2 font-bold text-xs"><i class="fas fa-phone"></i> CALL</a>
                <a href="${waLink}" target="_blank" class="bg-emerald-600 text-white p-3 rounded-2xl flex items-center justify-center gap-2 font-bold text-xs"><i class="fab fa-whatsapp"></i> REMIND</a>
             </div>

             <div class="flex gap-2 justify-center mt-3">
                <button onclick="currentTab='edit'; render()" class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-4 py-2 hover:text-emerald-700 transition">Update Profile / Fees</button>
                <button onclick="delStud('${s.id}')" class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-4 py-2 hover:text-rose-600 transition">Delete</button>
             </div>
          </div>

          <div class="bg-white p-6 rounded-[2.5rem] border border-slate-200">
             <div class="flex justify-between items-center mb-4">
                <h3 class="text-sm font-black uppercase text-slate-400 tracking-widest">Payment History</h3>
                <button onclick="payPrompt('${s.id}')" class="bg-emerald-700 text-white px-3 py-1.5 rounded-xl text-[10px] font-bold">ADD PAYMENT</button>
             </div>
             <div class="space-y-3">
                ${state.payments.filter(p=>p.studentId===s.id).sort((a,b)=>b.month.localeCompare(a.month)).map(p=>`
                  <div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl border border-slate-100 shadow-sm">
                     <div>
                        <p class="text-xs font-black text-slate-700 uppercase tracking-tighter">${getMoName(p.month)}</p>
                        <p class="text-[9px] text-slate-400 font-bold">${p.date}</p>
                     </div>
                     <div class="text-right">
                        <p class="text-xs font-black text-emerald-700">Rs. ${p.total}</p>
                        <button onclick="printReceipt('${p.id}')" class="text-[9px] font-black text-slate-400 underline uppercase">Receipt</button>
                     </div>
                  </div>
                `).join('') || '<p class="text-center text-[10px] text-slate-400 py-4 font-bold">No history.</p>'}
             </div>
          </div>
        </div>
      `;
    }

    function renderMess(el) {
      el.innerHTML = `
        <div class="space-y-4">
           <div class="flex justify-between items-center">
              <h2 class="text-xl font-black text-slate-800">Mess Logs</h2>
              <input type="date" value="${messDate}" onchange="messDate=this.value; render()" class="text-xs font-black border-none bg-white p-3 rounded-xl shadow-sm">
           </div>

           <div class="space-y-3">
              ${state.students.map(s => {
                const a = state.attendance.find(at => at.studentId === s.id && at.date === messDate) || {breakfast:false, lunch:false, dinner:false};
                return `
                   <div class="bg-white p-4 rounded-3xl border border-slate-200 flex items-center justify-between shadow-sm">
                      <div class="flex items-center gap-3 max-w-[45%]">
                         <img src="${s.photo || 'https://via.placeholder.com/100'}" class="w-10 h-10 rounded-xl object-cover">
                         <div class="truncate">
                            <p class="text-xs font-black text-slate-800 truncate">${s.name}</p>
                            <p class="text-[9px] font-bold text-slate-400 uppercase">${s.roomName}</p>
                         </div>
                      </div>
                      <div class="flex gap-2">
                         <button onclick="markMess('${s.id}', 'breakfast')" class="w-9 h-9 rounded-xl font-black text-[9px] transition border ${a.breakfast ? 'btn-b text-white border-none' : 'bg-slate-50 text-slate-300 border-slate-100'}">B</button>
                         <button onclick="markMess('${s.id}', 'lunch')" class="w-9 h-9 rounded-xl font-black text-[9px] transition border ${a.lunch ? 'btn-l text-white border-none' : 'bg-slate-50 text-slate-300 border-slate-100'}">L</button>
                         <button onclick="markMess('${s.id}', 'dinner')" class="w-9 h-9 rounded-xl font-black text-[9px] transition border ${a.dinner ? 'btn-d text-white border-none' : 'bg-slate-50 text-slate-300 border-slate-100'}">D</button>
                      </div>
                   </div>
                `;
              }).join('')}
           </div>
        </div>
      `;
    }

    function renderFinance(el) {
      el.innerHTML = `
        <div class="space-y-4">
           <div class="flex justify-between items-center">
              <h2 class="text-xl font-black text-slate-800 tracking-tighter">Collections</h2>
              <input type="month" value="${filterMonth}" onchange="filterMonth=this.value; render()" class="text-xs font-black border-none bg-white p-3 rounded-xl shadow-sm">
           </div>
           <div class="space-y-3">
              ${state.students.map(s => {
                const payments = state.payments.filter(px => px.studentId === s.id && px.month === filterMonth);
                const paidAmount = payments.reduce((sum, p) => sum + p.total, 0);
                const totalDue = s.hFee + s.mFee;
                const remaining = totalDue - paidAmount;
                const waLink = getWhatsAppLink(s, filterMonth);

                let statusBadge = '';
                if(paidAmount === 0) {
                    statusBadge = `<button onclick="payPrompt('${s.id}')" class="bg-rose-50 text-rose-600 px-4 py-2 rounded-xl text-[9px] font-black uppercase border border-rose-100">PENDING</button>`;
                } else if (paidAmount < totalDue) {
                    statusBadge = `<button onclick="payPrompt('${s.id}')" class="bg-orange-50 text-orange-600 px-4 py-2 rounded-xl text-[9px] font-black uppercase border border-orange-100">PARTIAL: Rs.${remaining}</button>`;
                } else {
                    statusBadge = `<span class="text-[9px] font-black bg-emerald-100 text-emerald-700 px-3 py-2 rounded-xl uppercase">PAID</span>`;
                }

                return `
                  <div class="bg-white p-5 rounded-[2rem] border border-slate-200 flex justify-between items-center shadow-sm">
                    <div class="flex items-center gap-4">
                       <img src="${s.photo || 'https://via.placeholder.com/100'}" class="w-10 h-10 rounded-xl object-cover grayscale opacity-50">
                       <div>
                          <h4 class="text-xs font-black text-slate-800">${s.name}</h4>
                          <p class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">Total: ${totalDue} | Paid: ${paidAmount}</p>
                       </div>
                    </div>
                    <div class="flex items-center gap-2">
                       ${remaining > 0 ? `<a href="${waLink}" target="_blank" class="w-8 h-8 bg-emerald-100 text-emerald-600 rounded-lg flex items-center justify-center text-xs"><i class="fab fa-whatsapp"></i></a>` : ''}
                       ${statusBadge}
                    </div>
                  </div>
                `;
              }).join('')}
           </div>
        </div>
      `;
    }

    function renderReports(el) {
      el.innerHTML = `
        <div class="space-y-6">
           <h2 class="text-xl font-black text-slate-800">Report Center</h2>
           <div class="bg-white p-6 rounded-[2.5rem] border border-slate-200 shadow-sm space-y-5">
              <div class="p-4 bg-slate-50 rounded-2xl">
                 <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block">Set Context</label>
                 <div class="flex gap-2">
                    <input type="date" value="${messDate}" onchange="messDate=this.value" class="flex-1 bg-white p-3 rounded-xl text-xs font-bold border-none shadow-sm">
                    <input type="month" value="${filterMonth}" onchange="filterMonth=this.value" class="flex-1 bg-white p-3 rounded-xl text-xs font-bold border-none shadow-sm">
                 </div>
              </div>

              <div class="grid grid-cols-1 gap-3">
                 <button onclick="genPDF('mess_daily')" class="flex items-center gap-4 bg-white border border-slate-100 p-5 rounded-2xl shadow-sm hover:border-emerald-500 transition active:scale-95">
                    <div class="w-12 h-12 bg-orange-50 text-orange-600 rounded-2xl flex items-center justify-center text-xl"><i class="fas fa-calendar-check"></i></div>
                    <div class="text-left"><p class="text-sm font-black text-slate-800">Daily Mess PDF</p><p class="text-[10px] text-slate-400 font-bold uppercase">${messDate}</p></div>
                 </button>
                 <button onclick="genPDF('paid')" class="bg-emerald-700 text-white p-5 rounded-3xl font-black text-sm shadow-xl active:scale-95 transition"><i class="fas fa-file-invoice-dollar mr-2"></i> List of Paid Residents</button>
                 <button onclick="genPDF('unpaid')" class="bg-rose-600 text-white p-5 rounded-3xl font-black text-sm shadow-xl active:scale-95 transition"><i class="fas fa-circle-exclamation mr-2"></i> List of Defaulters</button>
              </div>
           </div>
        </div>
      `;
    }

    function markMess(sId, type) {
      let a = state.attendance.find(x => x.studentId === sId && x.date === messDate);
      if(!a) { a = { studentId: sId, date: messDate, breakfast: false, lunch: false, dinner: false }; state.attendance.push(a); }
      a[type] = !a[type]; sync(); render();
    }

    function payPrompt(sId) {
      const s = state.students.find(x => x.id === sId);
      const payments = state.payments.filter(px => px.studentId === s.id && px.month === filterMonth);
      const alreadyPaid = payments.reduce((sum, p) => sum + p.total, 0);
      const totalDue = s.hFee + s.mFee;
      
      const amt = prompt(`Confirm payment for ${s.name} (${getMoName(filterMonth)})\nTotal Due: ${totalDue}\nAlready Paid: ${alreadyPaid}\n\nEnter amount to receive now:`, totalDue - alreadyPaid);
      
      if(amt && !isNaN(amt)) {
        state.payments.push({ 
            id: 'TXN' + Date.now(), studentId: sId, month: filterMonth, 
            date: new Date().toLocaleDateString('en-GB'), total: Number(amt) 
        });
        sync(); render();
      }
    }

    async function printReceipt(pId) {
      const p = state.payments.find(x => x.id === pId);
      const s = state.students.find(x => x.id === p.studentId);
      const container = document.getElementById('captureArea');
      
      const [year, month] = p.month.split('-');
      const mo = new Date(year, month - 1).toLocaleString('default', { month: 'long' });

      container.innerHTML = `
        <div class="receipt-container" id="rcpt">
          <div class="receipt-header">
            <img src="https://i.postimg.cc/RFFccnLV/2-removebg-preview.png" style="width:70px; margin-right:15px;">
            <div>
              <div class="receipt-title uppercase tracking-tighter">The Indus Boys Hostel</div>
              <div style="font-size:16px; opacity:0.8;">Sukkur • Mess & Residence Services</div>
            </div>
          </div>
          <div class="receipt-content" style="padding: 20px;">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
              <div>Ref: <span class="receipt-line">${p.id}</span></div>
              <div>Date: <span class="receipt-line">${p.date}</span></div>
            </div>
            <div style="margin-bottom:15px;">Fee Month: <span class="receipt-line" style="width:250px">${mo} ${year}</span></div>
            <div style="margin-bottom:15px;">Student Name: <span style="border-bottom:1px solid #000; display:inline-block; width:450px;">${s.name}</span></div>
            <div style="margin-bottom:15px;">Room: <span class="receipt-line" style="width:250px">${s.roomName}</span></div>
            
            <div style="display:flex; justify-content:flex-end; margin-top:30px;">
              <div class="receipt-amount-box">Received: Rs. ${p.total}</div>
            </div>
          </div>
          <div style="padding:20px; border-top:1px dashed #2c7a3f; margin-top:20px;">
            Authorized Signature: <br>
            <img src="https://i.postimg.cc/gkHL0kmy/29e8cd36_33df_42a7_ae74_8f1c946647e4_removalai_preview.png" style="width:150px; margin-top:10px;">
          </div>
        </div>
      `;

      const blob = await htmlToImage.toPng(document.getElementById('rcpt'));
      const a = document.createElement('a');
      a.download = `RECEIPT_${s.name}_${mo}.png`; a.href = blob; a.click();
    }

    function genPDF(type) {
      let t = ""; let h = ""; let r = "";
      const mo = getMoName(filterMonth);

      if(type === 'mess_daily') {
        t = `Daily Mess Attendance - ${messDate}`;
        h = `<th>Name</th><th>Room</th><th style="color:#f97316">Breakfast</th><th style="color:#3b82f6">Lunch</th><th style="color:#a855f7">Dinner</th>`;
        r = state.students.map(s => {
          const a = state.attendance.find(x => x.studentId === s.id && x.date === messDate) || {};
          return `<tr>
            <td>${s.name}</td><td>${s.roomName}</td><td>${a.breakfast?'✔️':''}</td><td>${a.lunch?'✔️':''}</td><td>${a.dinner?'✔️':''}</td>
          </tr>`;
        }).join('');
      } else if (type === 'paid') {
        t = `Fee Clearance Report - ${mo}`;
        h = `<th>Name</th><th>Room</th><th>Amount</th><th>Date Paid</th>`;
        r = state.payments.filter(p => p.month === filterMonth).map(p => {
          const s = state.students.find(x => x.id === p.studentId);
          return `<tr><td>${s.name}</td><td>${s.roomName}</td><td>Rs. ${p.total}</td><td>${p.date}</td></tr>`;
        }).join('');
      } else if (type === 'unpaid') {
        t = `Defaulters List (Unpaid/Partial) - ${mo}`;
        h = `<th>Name</th><th>Room</th><th>Phone</th><th>Remaining Dues</th>`;
        r = state.students.filter(s => {
          const paid = state.payments.filter(p => p.studentId === s.id && p.month === filterMonth).reduce((sum,px)=>sum+px.total,0);
          return paid < (s.hFee + s.mFee);
        }).map(s => {
          const paid = state.payments.filter(p => p.studentId === s.id && p.month === filterMonth).reduce((sum,px)=>sum+px.total,0);
          return `<tr><td>${s.name}</td><td>${s.roomName}</td><td>${s.phone}</td><td>Rs. ${(s.hFee+s.mFee) - paid}</td></tr>`;
        }).join('');
      }

      const win = window.open('', '_blank');
      win.document.write(`
        <html><head><title>${t}</title><style>
            body{ font-family: 'Inter', sans-serif; padding: 40px; }
            h1{ color: #2c7a3f; text-transform: uppercase; letter-spacing: -1px; margin-bottom: 5px; }
            hr{ border: 0; border-top: 2px solid #eee; margin-bottom: 20px; }
            table{ width: 100%; border-collapse: collapse; font-size: 13px; }
            th, td{ border-bottom: 1px solid #eee; padding: 12px; text-align: left; }
            th{ background: #f8fafc; color: #64748b; font-weight: 800; text-transform: uppercase; font-size: 10px; }
            @media print { .no-print { display: none; } }
        </style></head>
        <body>
            <div style="display:flex; justify-content:space-between; align-items:flex-end;">
                <div><h1>Indus Boys Hostel</h1><p style="font-weight:bold; color:#64748b; margin:0;">${t}</p></div>
                <button class="no-print" onclick="window.print()" style="padding:10px 20px; background:#2c7a3f; color:white; border:none; border-radius:5px; cursor:pointer;">Print PDF</button>
            </div>
            <hr>
            <table><thead><tr>${h}</tr></thead><tbody>${r}</tbody></table>
            <div style="margin-top:50px; text-align:right;">
                <div style="width:200px; border-bottom:2px solid #000; display:inline-block;"></div>
                <p style="font-size:10px; font-weight:bold; color:#64748b;">WARDEN / ADMIN SEAL</p>
            </div>
        </body></html>
      `);
      win.document.close();
    }

    function delStud(id) {
        if(confirm("Confirm removal of this resident and all history?")) {
            state.students = state.students.filter(x => x.id !== id);
            state.payments = state.payments.filter(x => x.studentId !== id);
            sync(); currentTab = 'rooms'; render();
        }
    }

    document.querySelectorAll('.nav-item').forEach(b => b.onclick = () => { currentTab = b.dataset.tab; render(); });
    document.getElementById('globalBackBtn').onclick = () => { currentTab = (currentTab === 'edit' || currentTab === 'profile') ? 'rooms' : 'dashboard'; render(); };
    render();
  </script>
</body>
</html>
